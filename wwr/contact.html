<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us| White Water Rafting</title>
    <meta name="description"
      content="Discover the story behind our rafting company everywhere, every day">
    <meta name="author" content="Urlin GUSTAVE">
    <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>
    <header>
        <div class="logo">
            <img src="images/wwr.png" alt="Logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="contact">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street<br>
                Kolob, California<br>
                +1 999 999 9999<br>
                info@whitewater.com
            </p>
        </section>
        <section class="contact-section">
            <div class="contact-info">

                <div class="map"><iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d2152435.178205625!2d-120.4646423828667!3d35.659567404471815!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sht!4v1781338938233!5m2!1sen!2sht"
                      allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>

            <form class="contact-form">
                <fieldset>
                    <div class="form-item column1">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="placeholder" required>
                    </div>
                    <div class="form-item column2">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="placeholder">
                    </div>
                </fieldset>


                <fieldset>
                    <legend> Message Purpose</legend>
                    <label><input type="radio" name="purpose"> General Inquiry</label>
                    <label><input type="radio" name="purpose"> Reservation</label>
                    <label><input type="radio" name="purpose"> Website Suggestion</label>
                </fieldset>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4"
                  placeholder="Type here..."></textarea>

                <label><input type="checkbox" id="newsletter" name="newsletter"> Please
                    Subscribe me to the monthly newsletter</label>

                <button type="submit">Get in touch</button>

            </form>


        </section>
        <section>
            <fieldset>
                <h3>We Are Here To Serve You</h3>
                <div class="gallery-contact">
                    <figure>
                        <img src="images/wwr.png" alt="Image 1">
                        <figcaption>Employee Profile</figcaption>
                    </figure>
                    <figure>
                        <img src="images/wwr.png" alt="Image 2">
                        <figcaption>Employee Profile</figcaption>
                    </figure>
                    <figure>
                        <img src="images/wwr.png" alt="Image 3">
                        <figcaption>Employee Profile</figcaption>
                    </figure>
                </div>
            </fieldset>
        </section>
    </main>

    <footer>
        <p> ©2026 ✌️ White Water Rafting | Urlin Gustave✌️</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebooki_icon.svg" alt="Facebook Icon" width="30">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-icon.svg" alt="LinkedIn Icon" width="30">
            </a>
            <a href=" https://instagram.com">
                <img src="images/instagram_icon.svg" alt="Instagram Icon" width="30">
            </a>
        </nav>

    </footer>

</body>


</html>
