<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Exercise</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <main>
        <h1>✅Basic HTML and CSS Quiz</h1>
        <form class="box">
            <div class="quiz-item box">
                <label for="q1">1. What does the acronym CSS stand for?</label><br>
                <input type="text" id="q1" name="q1"><br>
            </div>
            <div class="quiz-item box">
                <label for="q2">2. How are id and class attributes selected in CSS?</label><br>
                <textarea id="q2" name="q2" rows="3"></textarea><br>
            </div>
            <div class="quiz-item box">
                <label for="CSS">3. Which of the following is a valid CSS comment?</label><br>
                <select name="CSS" id="CSS">
                    <option value="" selected disabled>Choose one...</option>
                    <option value="a">A. &lt This is a comment </option>
                    <option value="b">B. /* This is a comment </option>
                    <option value="c">C. // This is a comment </option>
                </select><br>
            </div>
            <div class="quiz-item box">
                <label for="q4">4. What is the bottom margin given this declaration?</label><br>
                <code class="box">margin: 10px 5px 15px</code>
                <input type="text" id="q4" name="q4"><br>
            </div>


            <div class="container">
                <button type="submit">Submit Quiz</button>
            </div>
            </fieldset>

        </form>
    </main>
